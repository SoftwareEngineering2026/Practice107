services:
  nginx:
    build:
      context: ./nginx
    container_name: ai_text_helper_nginx
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
    container_name: ai_text_helper_frontend
    depends_on:
      - backend
    networks:
      - app_network

  backend:
    build:
      context: ./backend
    container_name: ai_text_helper_backend
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_NAME: text_tasks
    depends_on:
      - redis
    networks:
      - app_network

  worker:
    build:
      context: ./worker
    container_name: ai_text_helper_worker
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_NAME: text_tasks
      MODEL_NAME: cointegrated/rut5-small
    depends_on:
      - redis
    networks:
      - app_network

  redis:
    image: redis:7.2-alpine
    container_name: ai_text_helper_redis
    networks:
      - app_network

  loki:
    image: grafana/loki:3.2.0
    container_name: ai_text_helper_loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml
      - loki_data:/loki
    networks:
      - app_network

  mimir:
    image: grafana/mimir:2.14.0
    container_name: ai_text_helper_mimir
    command: -config.file=/etc/mimir/mimir.yml
    volumes:
      - ./monitoring/mimir/mimir.yml:/etc/mimir/mimir.yml
      - mimir_data:/data
    networks:
      - app_network

  alloy:
    image: grafana/alloy:v1.5.1
    container_name: ai_text_helper_alloy
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    volumes:
      - ./monitoring/alloy/config.alloy:/etc/alloy/config.alloy
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - backend
      - loki
      - mimir
    networks:
      - app_network

  grafana:
    image: grafana/grafana:11.2.0
    container_name: ai_text_helper_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
      - mimir
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  grafana_data:
  loki_data:
  mimir_data: